name: photo_viewer
description: 'Flutter image viewer library with multiple display modes. Features include: pinch-zoom, double-tap zoom, vertical dismiss, page navigation, custom overlays, and hero animations.'
version: 1.0.0
repository: https://github.com/kumamotone/photo_viewer
homepage: https://pub.dev/packages/photo_viewer
publish_to: none

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  cached_network_image_ce:
    git: https://github.com/kumsumit/cached_network_image_ce.git
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
